services:
  mongo:
    image: mongo:7
    container_name: planly-mongo
    ports:
      - "27017:27017"
    volumes:
      - planly-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planly-backend
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env
    environment:
      # Konteyner içinde 'localhost' Mongo'ya gitmez; servis adı 'mongo' olmalı
      MONGODB_URI: mongodb://mongo:27017/planly
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: planly-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  planly-mongo-data:
