openapi: 3.0.3
info:
  title: Planly API — Gereksinimler (9–16)
  version: "2.0.0"
  description: |
    Sınav/konu, AI plan, canlı çalışma oturumu, arkadaş çıkarma (15), haftalık istatistik (16).
    Not: Görev ilerlemesi (`POST /api/analytics/progress`) ve plan kaydı (`PUT /api/auth/me/plan`) backend’de vardır; bu dosyada numaralandırılmamıştır.

servers:
  - url: http://127.0.0.1:5001
    description: Yerel backend
  - url: http://localhost:5001
    description: Yerel backend (localhost)

tags:
  - name: "9 — Sınav türü listeleme"
  - name: "10 — Konuları getirme"
  - name: "11 — AI ile çalışma programı"
  - name: "12 — Çalışmayı başlatma"
  - name: "13 — Çalışma durumu güncelleme"
  - name: "14 — Çalışmayı bitirme"
  - name: "15 — Arkadaş çıkarma"
  - name: "16 — Çalışma istatistikleri"

paths:
  /api/exams:
    get:
      tags:
        - "9 — Sınav türü listeleme"
        - "10 — Konuları getirme"
      summary: Sınav türleri ve konular
      description: |
        **Gereksinim 9:** Tanımlı sınav türlerinin listesi.
        **Gereksinim 10:** Seçilen sınavın konu ve alt konuları aynı yanıtta `subjects` / `topics` içinde gelir (ayrı `/exam-types/{id}/topics` URL’i yoktur).
      operationId: listExams
      security: []
      responses:
        "200":
          description: Normalize edilmiş sınav dizisi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamItem"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /api/generate-schedule:
    post:
      tags: ["11 — AI ile çalışma programı"]
      summary: AI ile çalışma programı üretme
      description: |
        **Gereksinim 11:** Sınav, konular, süre ve hedef tarihe göre yapay zeka (veya yedek) ile program üretir.
      operationId: generateSchedule
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [exam, subjects, hours]
              properties:
                exam: { type: string }
                subjects:
                  type: array
                  items: { type: string }
                topics:
                  type: object
                  additionalProperties:
                    type: array
                    items: { type: string }
                hours: { type: number }
                deadline: { type: string }
      responses:
        "200":
          description: plan, schedule, meta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedPlan"
        "400":
          description: Eksik alan

  /api/live/me:
    get:
      tags:
        - "12 — Çalışmayı başlatma"
        - "13 — Çalışma durumu güncelleme"
        - "14 — Çalışmayı bitirme"
      summary: Kendi canlı çalışma oturumunu okuma
      description: |
        Mevcut oturum durumu (`idle` / `running` / `paused`), süre ve `runningSince`.
        **Gereksinim 12–14** için durum değişikliği aşağıdaki `PUT /api/live/me` ile yapılır.
      operationId: getLiveSession
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags:
        - "12 — Çalışmayı başlatma"
        - "13 — Çalışma durumu güncelleme"
        - "14 — Çalışmayı bitirme"
      summary: Oturumu başlatma, durum güncelleme veya bitirme
      description: |
        **Gereksinim 12:** `status: running` ve uygun `runningSince` ile çalışmayı başlatma.
        **Gereksinim 13:** `running`, `paused`, `idle` ile durum güncelleme; `elapsedMs` güncellenir.
        **Gereksinim 14:** `status: idle` ve güncel `elapsedMs` ile çalışmayı bitirme (URL’de `sessionId` yok; oturum kullanıcıya bağlıdır).
      operationId: updateLiveSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LiveSessionUpdate"
      responses:
        "200":
          description: Oturum güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveSessionResponse"
        "400":
          description: Geçersiz status
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/me/friends/{friendName}:
    delete:
      tags: ["15 — Arkadaş çıkarma"]
      summary: Arkadaş çıkarma
      description: |
        **Gereksinim 15:** Arkadaş listesinden kullanıcı adı ile eşleşen kaydı siler.
        Path’teki `friendName` URL-encode edilebilir (ör. boşluk `%20`).
      operationId: removeFriend
      parameters:
        - name: friendName
          in: path
          required: true
          schema:
            type: string
          description: Çıkarılacak arkadaşın kullanıcı adı
      responses:
        "200":
          description: Arkadaş çıkarıldı; güncel `friends` listesi dönebilir
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          description: Arkadaş adı boş veya geçersiz

  /api/analytics/weekly:
    get:
      tags: ["16 — Çalışma istatistikleri"]
      summary: Haftalık çalışma istatistikleri
      description: |
        **Gereksinim 16:** Tablodaki `GET /statistics` karşılığı — haftalık toplam görev, süre, aktif günler, skor.
      operationId: getWeeklyAnalysis
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyAnalysis"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Yetkisiz veya geçersiz token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"

  schemas:
    ErrorMessage:
      type: object
      properties:
        message:
          type: string

    ExamItem:
      type: object
      properties:
        name: { type: string }
        subjects:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              topics:
                type: array
                items: { type: string }

    GeneratedPlan:
      type: object
      properties:
        message: { type: string }
        plan: { type: string }
        schedule: { type: object }
        meta: { type: object }

    LiveSessionUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [idle, running, paused]
        elapsedMs: { type: number }
        runningSince:
          type: string
          format: date-time
          nullable: true

    LiveSessionResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/LiveSessionUpdate"

    WeeklyAnalysis:
      type: object
      properties:
        weekStart: { type: string }
        daily:
          type: array
          items: { type: object }
        totals:
          type: object
          properties:
            completedTasks: { type: number }
            studyMinutes: { type: number }
        activeDays: { type: number }
        productivityScore: { type: number }

security:
  - BearerAuth: []
